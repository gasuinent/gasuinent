<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갤러리 관리</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:"Malgun Gothic",sans-serif;
}

header{
    background:#222;
    color:#FFD700;
    text-align:center;
    padding:25px;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #555;
    padding:12px;
    text-align:center;
}

th{
    background:#333;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
}

input[type=text],
input[type=file],
textarea{
    width:100%;
    padding:12px;
    box-sizing:border-box;
    font-size:16px;
}

textarea{
    height:120px;
}

button{
    padding:12px 25px;
    margin-top:15px;
    background:#FFD700;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.back{
    float:right;
}
</style>

</head>

<body>

<header>
<h1>🖼 갤러리 관리</h1>
</header>

<div class="container">

<h2>등록된 사진</h2>

<table>

<tr>
<th>번호</th>
<th>사진제목</th>
<th>등록일</th>
<th>수정</th>
<th>삭제</th>
</tr>

<tr>
<td>1</td>
<td>샘플 사진</td>
<td>2026-07-23</td>
<td><button>수정</button></td>
<td><button>삭제</button></td>
</tr>

</table>

<label>사진 제목</label>
<input type="text" placeholder="사진 제목">

<label>사진 선택</label>
<input type="file">

<label>사진 설명</label>
<textarea placeholder="사진 설명"></textarea>

<button>사진 등록</button>

<button class="back" onclick="location.href='admin.html'">
관리자 메인
</button>

</div>

</body>
</html>
