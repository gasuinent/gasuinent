<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공연일정 관리</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:"Malgun Gothic",sans-serif;
}
header{
    background:#222;
    color:#FFD700;
    text-align:center;
    padding:25px;
}
.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #555;
    padding:12px;
    text-align:center;
}
th{
    background:#333;
}
label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
}
input,textarea{
    width:100%;
    padding:12px;
    box-sizing:border-box;
    font-size:16px;
}
textarea{
    height:120px;
}
button{
    padding:12px 25px;
    margin-top:15px;
    background:#FFD700;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
.back{
    float:right;
}
</style>

</head>
<body>

<header>
<h1>📅 공연일정 관리</h1>
</header>

<div class="container">

<h2>등록된 공연</h2>

<table>
<tr>
<th>번호</th>
<th>행사명</th>
<th>날짜</th>
<th>수정</th>
<th>삭제</th>
</tr>

<tr>
<td>1</td>
<td>샘플 공연</td>
<td>2026-07-23</td>
<td><button>수정</button></td>
<td><button>삭제</button></td>
</tr>

</table>

<label>행사명</label>
<input type="text" placeholder="행사명을 입력하세요">

<label>공연 날짜</label>
<input type="date">

<label>공연 장소</label>
<input type="text" placeholder="공연 장소">

<label>공연 내용</label>
<textarea placeholder="공연 내용을 입력하세요"></textarea>

<button>공연 등록</button>

<button class="back" onclick="location.href='admin.html'">
관리자 메인
</button>

</div>

</body>
</html>
