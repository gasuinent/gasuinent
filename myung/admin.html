<!DOCTYPE html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 시스템</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:"Malgun Gothic",sans-serif;
}

header{
    background:#222;
    text-align:center;
    padding:30px;
}

header h1{
    color:#FFD700;
    margin:0;
    font-size:36px;
}

header p{
    margin-top:10px;
    color:#ddd;
    font-size:18px;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.card{
    background:#1e1e1e;
    border:1px solid #444;
    border-radius:10px;
    margin-bottom:20px;
    padding:20px;
}

.card h2{
    margin:0 0 15px 0;
    color:#FFD700;
}

.menu{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.menu button{
    padding:18px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    background:#FFD700;
    cursor:pointer;
}

.menu button:hover{
    background:#ffcc00;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#aaa;
    font-size:14px;
}
</style>

</head>
