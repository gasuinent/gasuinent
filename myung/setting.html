<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환경설정</title>

<style>
body{
margin:0;
background:#111;
color:#fff;
font-family:"Malgun Gothic",sans-serif;
}
header{
background:#222;
color:#FFD700;
text-align:center;
padding:25px;
}
.container{
width:90%;
max-width:900px;
margin:30px auto;
}
label{
display:block;
margin-top:20px;
margin-bottom:8px;
}
input{
width:100%;
padding:12px;
box-sizing:border-box;
font-size:16px;
}
button{
padding:12px 25px;
margin-top:15px;
background:#FFD700;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
.back{
float:right;
}
</style>

</head>

<body>

<header>
<h1>⚙ 환경설정</h1>
</header>

<div class="container">

<label>홈페이지 제목</label>
<input type="text" value="가수인생활 엔터테인먼트">

<label>관리자 이메일</label>
<input type="text" placeholder="admin@example.com">

<label>대표 연락처</label>
<input type="text" placeholder="010-0000-0000">

<button>설정 저장</button>

<button class="back" onclick="location.href='admin.html'">
관리자 메인
</button>

</div>

</body>
</html>
