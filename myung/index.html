<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스관리</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:"Malgun Gothic",sans-serif;
}

header{
    background:#222;
    color:#FFD700;
    text-align:center;
    padding:20px;
}

header h1{
    margin:0;
    font-size:32px;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

.search{
    margin-top:20px;
}

.search input{
    width:300px;
    padding:10px;
    font-size:16px;
}

.search button{
    padding:10px 20px;
    margin-left:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

table th,
table td{
    border:1px solid #555;
    padding:12px;
    text-align:center;
}

table th{
    background:#333;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-size:18px;
}

input[type=text],
textarea{
    width:100%;
    padding:12px;
    box-sizing:border-box;
    font-size:16px;
}

textarea{
    height:220px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    background:#FFD700;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ffcc00;
}

.back{
    float:right;
}
</style>

</head>

<body>

<header>

<h1>📰 뉴스관리</h1>

<div class="search">
<input type="text" placeholder="뉴스 검색...">
<button>검색</button>
</div>

</header>

<div class="container">

<h2>등록된 뉴스</h2>

<table>

<tr>
<th>번호</th>
<th>제목</th>
<th>작성일</th>
<th>수정</th>
<th>삭제</th>
</tr>

<tr>
<td>1</td>
<td>첫 번째 뉴스</td>
<td>2026-07-23</td>
<td><button>수정</button></td>
<td><button>삭제</button></td>
</tr>

</table>

<label>뉴스 제목</label>
<input type="text" placeholder="제목을 입력하세요">

<label>사진 선택</label>
<input type="file">

<label>뉴스 내용</label>
<textarea placeholder="내용을 입력하세요"></textarea>

<button>저장</button>

<button class="back" onclick="location.href='admin.html'">
관리자 메인으로
</button>

</div>

</body>
</html>
