
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가수인생활 엔터테인먼트 관리자</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:"Malgun Gothic",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:420px;
    background:#222;
    padding:40px;
    border-radius:15px;
    text-align:center;
    color:white;
}

h1{
    color:#FFD700;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#FFD700;
    color:#000;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ffcc00;
}
</style>

</head>

<body>

<div class="box">

<h1>가수인생활 엔터테인먼트</h1>

<h2>관리자 로그인</h2>

<input type="text" placeholder="아이디">

<input type="password" placeholder="비밀번호">

<button onclick="location.href='admin.html'">
로그인
</button>

</div>

</body>
</html>
