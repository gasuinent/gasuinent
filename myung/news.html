
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스관리</title>

<style>

body{
margin:0;
background:#111;
font-family:Malgun Gothic,sans-serif;
color:white;
}

header{
background:#222;
padding:20px;
text-align:center;
font-size:32px;
color:#FFD700;
font-weight:bold;
}

.container{
width:900px;
margin:30px auto;
}

label{
display:block;
margin-top:20px;
margin-bottom:8px;
font-size:20px;
}

input,textarea{

width:100%;
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
box-sizing:border-box;

}

textarea{

height:250px;

}

button{

margin-top:20px;
padding:15px 30px;
font-size:20px;
background:#FFD700;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;

}

button:hover{

background:#ffcc00;

}

.back{

float:right;

}

</style>

</head>

<body>

<header>

📰 뉴스관리

</header>

<div class="container">

<label>뉴스 제목</label>

<input type="text" placeholder="제목을 입력하세요">

<label>사진 선택</label>

<input type="file">

<label>뉴스 내용</label>

<textarea placeholder="내용을 입력하세요"></textarea>

<button>저장</button>

<button class="back"
onclick="location.href='admin.html'">

관리자 메인으로

</button>

</div>

</body>
</html>
