
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스관리</title>

<style>

body{
margin:0;
background:#111;
font-family:Malgun Gothic,sans-serif;
color:white;
}

header{
background:#222;
padding:20px;
text-align:center;
font-size:32px;
color:#FFD700;
font-weight:bold;
}

.container{
width:900px;
margin:30px auto;
}

label{
display:block;
margin-top:20px;
margin-bottom:8px;
font-size:20px;
}

input,textarea{

width:100%;
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
box-sizing:border-box;

}

textarea{

height:250px;

}

button{

margin-top:20px;
padding:15px 30px;
font-size:20px;
background:#FFD700;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;

}

button:hover{

background:#ffcc00;

}

.back{

float:right;

}

</style>

</head>

<body>

.<header>

<div style="margin-top:15px;">

<input
type="text"
placeholder="뉴스 검색..."
style="width:300px;padding:10px;border-radius:6px;border:none;">

<button style="padding:10px 20px;margin-left:10px;">
검색
</button>

</div>

</header>
